# kubectl create deployment scale-app --image=nginx:alpine --dry-run=client -o yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: scale-app
  name: scale-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scale-app
  strategy: {}
  template:
    metadata:
      labels:
        app: scale-app
    spec:
      containers:
      - image: nginx:alpine
        name: nginx
        resources: {}
status: {}