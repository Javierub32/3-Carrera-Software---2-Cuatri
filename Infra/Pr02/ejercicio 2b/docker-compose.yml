services:
  db:
    container_name: baseDeDatos_postgres
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secretpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: interfazGrafica_adminer 
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy