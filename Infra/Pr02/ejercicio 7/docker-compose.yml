services:
  db:
    image: mysql:8.0
    networks:
      - wordpress_net
    volumes:
      - mysql_vol:/var/lib/mysql
    environment:
      - MYSQL_PASSWORD=contrasena
      - MYSQL_DATABASE=database
      - MYSQL_USER=user
      - MYSQL_ROOT_PASSWORD=contrasena


  wordpress: 
    image: wordpress:latest
    ports:
      - "8080:80"
    networks:
      - wordpress_net
    volumes:
      - wordpress_vol:/var/www/html
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=user
      - WORDPRESS_DB_PASSWORD=contrasena
      - WORDPRESS_DB_NAME=database

networks:
  wordpress_net:

volumes:
  wordpress_vol:
  mysql_vol: